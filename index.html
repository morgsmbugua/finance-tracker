<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Household Finance Tracker</title>
  <style>
    :root { 
      --primary-blue: #0056b3; 
      --deep-black: #121212; 
      --pure-white: #ffffff;
      --income-green: #2ecc71; 
      --expense-red: #e74c3c; 
    }
    * {
        scroll-behavior: smooth;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    box-sizing: border-box;
    }
    body { 
      max-width: 100vw;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; 
      background-color: #151515; 
      color: var(--pure-white); 
      margin: 0; 
      padding: 10px; 
      display: flex; 
      justify-content: center; 
    }

    .container { 
      width: 100%;
      background: #15151524; 
      padding: 25px; 
      border-radius: 5px; 
      box-shadow: 0.1px 0.1px 4px rgb(255, 255, 255);
      border: 1px solid #333;
    }

    h2 { 
        text-align: center; 
        color: var(--primary-blue); 
        letter-spacing: 5px; 
        margin-top: 0; 
        font-weight: 400;
    }
    
    .hp-container { 
        margin-bottom: 25px; 
    }
    .hp-label { 
        display: flex; 
        justify-content: space-between; 
        margin-bottom: 8px; 
        font-size: 12px; 
        font-weight: 500; 
        color: #aaa; 
    }
    .hp-bar-bg { 
        width: 100%; 
        height: 5px; 
        background: #575757bb; 
        border-radius: 2px; 
        overflow: hidden; 
    }
    .hp-fill { 
        height: 100%; 
        width: 100%; 
        transition: width 0.6s ease; 
        background: var(--primary-blue); 
    }

    .balance-section { 
        max-width: 100%;
        text-align: center; 
        margin-bottom: 25px; 
        background-color: #222; 
        padding: 15px; 
        border-radius: 5px; 
        position: relative;
    }
    .balance-section small { 
        color: #ffffffb7; 
        text-transform: uppercase; 
        font-size: 13px; 
        letter-spacing: 5px; 
    }
    .balance-section h1 { 
        margin: 5px 0 0 0; 
        white-space: nowrap; 
        overflow: hidden; 
        text-overflow: ellipsis; 
        color: var(--pure-white); 
        font-size: 32px; 
        display: inline-block;
    }
    
    .toggle-visibility {
        background: none;
        border: none;
        color: var(--primary-blue);
        cursor: pointer;
        font-size: 18px;
        vertical-align: middle;
        margin-left: 10px;
        opacity: 0.7;
        transition: opacity 0.3s;
    }

    .stat-grid { 
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 15px; 
        margin-bottom: 25px; 
    }
    .stat-card { 
        padding: 12px; 
        border-radius: 5px; 
        white-space: nowrap; 
        overflow: hidden;
        text-overflow: ellipsis;
        text-align: center; 
        background: var(--pure-white); 
        color: var(--deep-black); 
    }
    .stat-card small { 
        display: block; 
        font-size: 10px; 
        margin-bottom: 4px; 
        opacity: 0.7; 
        font-weight: 750; 
    }
    .stat-card span { 
        font-size: 16px; 
        font-weight: 800; 
    }

    .section-title { 
        font-size: 13px; 
        font-weight: 650; 
        text-align: center;
        text-transform: uppercase; 
        margin: 25px 0 12px; 
        color: var(--primary-blue);
        padding-left: 10px; 
    }
    .input-row { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 10px; 
        background: #3232327c; 
        padding: 10px 15px; 
        border-radius: 5px; 
        gap: 8px;
    }
    .input-row span {
        flex: 1;
        font-size: 14px;
    }
    .input-row input { 
        width: 110px; 
        padding: 8px; 
        border-radius: 3px; 
        border: 1px solid #444; 
        background: var(--pure-white); 
        color: var(--deep-black); 
        text-align: right; 
        font-weight: 650; 
        outline: none; 
    }

    .delete-field-btn {
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
        font-size: 14px;
        padding: 0 5px;
    }

    /* LIBRARY STYLES */
    .field-library { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; padding: 0 5px; }
    .library-chip { background: #222; color: #aaa; border: 1px solid #444; padding: 4px 10px; border-radius: 15px; font-size: 10px; cursor: pointer; text-transform: uppercase; }
    .library-chip:hover { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
    .library-label { font-size: 9px; color: #555; text-transform: uppercase; margin-bottom: 5px; padding-left: 5px; display: block; }

    .history-header { 
        display: grid; 
        grid-template-columns: 1.2fr 1fr 1fr 1fr 0.4fr; 
        font-size: 10px; 
        color: #b5b5b5; 
        font-weight: 500; 
        padding: 0 10px 5px; 
        text-transform: uppercase; 
    }
    .history-list { 
        max-height: 400px; 
        overflow-y: auto; 
        background: rgba(0, 0, 0, 0.652); 
        border-radius: 5px; 
        padding: 5px; 
        font-weight: 500;
    }
    .day-group { border-bottom: 1px solid #3c3c3c; }
    .history-summary-row { 
        display: grid; 
        grid-template-columns: 1.2fr 1fr 1fr 1fr 0.4fr; 
        align-items: center; 
        font-size: 11px; 
        font-weight: 500;
        padding: 12px 5px; 
        cursor: pointer; 
    }
    .day-details { background: #151515; padding: 0 10px; display: none; border-radius: 8px; margin: 0 5px 10px; }
    .detail-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 10px; border-bottom: 1px solid #222; }

    .full-btn { 
        width: 50%;
        text-align: center;
        position: relative;
        left: 25%;
        margin: 20px 0; 
        padding: 15px; 
        border-radius: 5px; 
        border: none; 
        font-weight: 500; 
        cursor: pointer; 
        background: var(--primary-blue); 
        color: var(--pure-white); 
        text-transform: uppercase; 
    }
    .footer-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .reset-btn { background: transparent; color: #ffffff; border: 0.1px solid #ffffff; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: 500; text-transform: uppercase; }
    .xls-btn { background: var(--pure-white); color: var(--deep-black); padding: 12px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: 500; text-transform: uppercase; border: none; }
    .action-btn { background: none; border: none; color: #ffffff; cursor: pointer; font-size: 15px; }

    .custom-adder { display: flex; gap: 8px; margin: 10px 0 20px; padding: 0 5px; }
    .custom-adder input { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; font-size: 11px; }
    .add-btn { background: var(--primary-blue); color: white; border: none; padding: 0 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
    .editing-mode { background: var(--primary-blue); color: white; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; font-size: 12px; font-weight: 500; }
  </style>
  <link rel="icon" href="images/bob.png">
</head>
<body>

<div class="container">
  <h2>HOUSEHOLD FINANCE</h2>
  
  <div id="edit-indicator" style="display:none;" class="editing-mode">✏️ UPDATING RECORD FOR: <span id="edit-date-label"></span></div>

  <div class="hp-container">
    <div class="hp-label"><span>BUDGET HEALTH</span><span id="hp-percent">100%</span></div>
    <div class="hp-bar-bg"><div id="hp-fill" class="hp-fill"></div></div>
  </div>

  <div class="balance-section">
    <small>Current Total Balance</small><br>
    <h1 id="balance">Ksh ••••</h1>
    <button class="toggle-visibility" onclick="toggleBalance()" id="visibility-btn">👁️</button>
  </div>

  <div class="stat-grid">
    <div class="stat-card"><small>ENTRY INCOME</small><span id="inc-total" style="color:var(--income-green)">0</span></div>
    <div class="stat-card"><small>ENTRY EXPENSE</small><span id="exp-total" style="color:var(--expense-red)">0</span></div>
  </div>

  <div class="section-title">Income Sources</div>
  <div class="input-row"><span>Income</span><input type="number" class="inc-input" data-label="Income" id="f-income" placeholder="0"></div>
  
  <div id="custom-inc-container"></div>
  <div class="custom-adder">
    <input type="text" id="new-inc-name" placeholder="Add custom income...">
    <button class="add-btn" onclick="addNewField('inc')">+</button>
  </div>
  <span class="library-label" id="lib-inc-label" style="display:none;">Suggestions</span>
  <div class="field-library" id="lib-inc-container"></div>

  <div class="section-title">Household Expenses</div>
  <div class="input-row"><span>Food</span><input type="number" class="exp-input" data-label="Food" id="f-food" placeholder="0"></div>
  <div class="input-row"><span>Electricity</span><input type="number" class="exp-input" data-label="Electricity" id="f-elec" placeholder="0"></div>
  
  <div id="custom-exp-container"></div>
  <div class="custom-adder">
    <input type="text" id="new-exp-name" placeholder="Add custom expense...">
    <button class="add-btn" onclick="addNewField('exp')">+</button>
  </div>
  <span class="library-label" id="lib-exp-label" style="display:none;">Suggestions</span>
  <div class="field-library" id="lib-exp-container"></div>

  <button class="full-btn" id="save-btn" onclick="saveToHistory()">SAVE</button>

  <div class="section-title" style="font-weight: 400;">History</div>
  <div class="history-header"><span>Date</span><span>In</span><span>Out</span><span>Bal</span><span></span></div>
  <div class="history-list" id="history-log"></div>

  <div style="margin-top: 30px;" class="footer-btns">
      <button onclick="hardReset()" class="reset-btn">Reset Data</button>
      <button onclick="exportToExcel()" class="xls-btn">Export Data</button>
  </div>
  <p style="text-align: center; margin-bottom:-10px; display:flex; justify-content:center">&copy;morgsmbugua</p>
</div>

<script>
  // Initial pre-loaded library items
  const starterLibrary = {
      inc: ['Gifts', 'Bonus', 'Side Hustle', 'Debt (Received)'],
      exp: ['Rent', 'Transport', 'School Fees', 'Debt (Repayment)', 'Gas', 'Wifi', 'Water']
  };

  let activeFields = JSON.parse(localStorage.getItem('hh_active_v5')) || { inc: [], exp: [] };
  let fieldLibrary = JSON.parse(localStorage.getItem('hh_lib_v5')) || starterLibrary;
  let txLogs = JSON.parse(localStorage.getItem('hh_data_v5')) || [];
  let currentlyEditingDate = null;
  let isBalanceHidden = true;

  function init() {
    activeFields.inc.forEach(name => createInputMarkup('inc', name));
    activeFields.exp.forEach(name => createInputMarkup('exp', name));
    renderLibrary();
    document.querySelectorAll('input').forEach(i => i.addEventListener('input', runCalc));
    renderHist();
    runCalc();
  }

  function toggleBalance() {
    isBalanceHidden = !isBalanceHidden;
    document.getElementById('visibility-btn').innerText = isBalanceHidden ? '👁️' : '🙈';
    runCalc();
  }

  function runCalc() {
    let inputInc = 0, inputExp = 0;
    document.querySelectorAll('.inc-input').forEach(i => inputInc += parseFloat(i.value)||0);
    document.querySelectorAll('.exp-input').forEach(i => inputExp += parseFloat(i.value)||0);

    let histInc = 0, histExp = 0;
    txLogs.forEach(log => {
      if (log.date !== currentlyEditingDate) {
        log.type === 'Income' ? histInc += log.amount : histExp += log.amount;
      }
    });

    const totalBal = (histInc + inputInc) - (histExp + inputExp);
    document.getElementById('inc-total').innerText = inputInc.toLocaleString();
    document.getElementById('exp-total').innerText = inputExp.toLocaleString();
    document.getElementById('balance').innerText = isBalanceHidden ? "Ksh ••••" : `Ksh ${totalBal.toLocaleString()}`;
    
    let hp = (histInc + inputInc) > 0 ? (totalBal / (histInc + inputInc)) * 100 : 100;
    const fill = document.getElementById('hp-fill');
    fill.style.width = Math.max(0, Math.min(100, hp)) + "%";
    fill.style.background = hp > 50 ? "var(--income-green)" : (hp > 20 ? "#f1c40f" : "var(--expense-red)");
    document.getElementById('hp-percent').innerText = Math.round(hp) + "%";
  }

  function addNewField(type) {
    const inputId = type === 'inc' ? 'new-inc-name' : 'new-exp-name';
    const name = document.getElementById(inputId).value.trim();
    if (!name) return;
    activateField(type, name);
    document.getElementById(inputId).value = '';
  }

  function activateField(type, name) {
    if (!activeFields[type].includes(name)) {
        activeFields[type].push(name);
        fieldLibrary[type] = fieldLibrary[type].filter(n => n !== name);
        saveSettings();
        createInputMarkup(type, name);
        renderLibrary();
        document.querySelectorAll('input').forEach(i => i.addEventListener('input', runCalc));
    }
  }

  function removeField(type, name) {
    activeFields[type] = activeFields[type].filter(n => n !== name);
    if (!fieldLibrary[type].includes(name)) fieldLibrary[type].push(name);
    saveSettings();
    document.getElementById('row-' + type + '-' + name.replace(/\s+/g, '-').toLowerCase()).remove();
    renderLibrary();
    runCalc();
  }

  function createInputMarkup(type, name) {
    const container = document.getElementById(type === 'inc' ? 'custom-inc-container' : 'custom-exp-container');
    const div = document.createElement('div');
    const safeId = name.replace(/\s+/g, '-').toLowerCase();
    div.className = 'input-row';
    div.id = 'row-' + type + '-' + safeId;
    div.innerHTML = `
        <button class="delete-field-btn" onclick="removeField('${type}', '${name}')">🗑️</button>
        <span>${name}</span> 
        <input type="number" class="${type}-input" data-label="${name}" id="f-c-${type}-${safeId}" placeholder="0">
    `;
    container.appendChild(div);
  }

  function renderLibrary() {
    ['inc', 'exp'].forEach(type => {
        const container = document.getElementById(`lib-${type}-container`);
        const label = document.getElementById(`lib-${type}-label`);
        container.innerHTML = '';
        fieldLibrary[type].forEach(name => {
            const chip = document.createElement('div');
            chip.className = 'library-chip';
            chip.innerText = name + ' +';
            chip.onclick = () => activateField(type, name);
            container.appendChild(chip);
        });
        label.style.display = fieldLibrary[type].length > 0 ? 'block' : 'none';
    });
  }

  function saveSettings() {
    localStorage.setItem('hh_active_v5', JSON.stringify(activeFields));
    localStorage.setItem('hh_lib_v5', JSON.stringify(fieldLibrary));
  }

  function saveToHistory() {
    const date = currentlyEditingDate || new Date().toLocaleDateString('en-GB');
    
    // 1. Collect all non-zero entries from the current inputs
    let newEntries = [];
    document.querySelectorAll('input[type="number"]').forEach(i => {
      const val = parseFloat(i.value) || 0;
      if (val !== 0) {
        newEntries.push({ 
          date, 
          category: i.getAttribute('data-label'), 
          type: i.classList.contains('inc-input') ? 'Income' : 'Expense', 
          amount: val, 
          fieldId: i.id 
        });
      }
    });

    // 2. CRITICAL CHECK: If all inputs are 0, do nothing and stop the function
    if (newEntries.length === 0) {
      alert("No data entered. Previous records for this date were not changed.");
      return; 
    }

    // 3. Only if we have new data, remove the old records for this date and add new ones
    txLogs = txLogs.filter(log => log.date !== date);
    txLogs.push(...newEntries);

    // 4. Save to memory and refresh UI
    localStorage.setItem('hh_final_data_v5', JSON.stringify(txLogs));
    currentlyEditingDate = null;
    document.getElementById('edit-indicator').style.display = 'none';
    document.getElementById('save-btn').innerText = "Saved to Dashboard";
    document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
    
    renderHist();
    runCalc();
  }

  function renderHist() {
    const logContainer = document.getElementById('history-log');
    logContainer.innerHTML = txLogs.length ? '' : '<div style="text-align:center; padding:15px; color:#555;">No records</div>';
    const grouped = txLogs.reduce((acc, log) => {
      if (!acc[log.date]) acc[log.date] = { inc: 0, exp: 0, items: [] };
      log.type === 'Income' ? acc[log.date].inc += log.amount : acc[log.date].exp += log.amount;
      acc[log.date].items.push(log);
      return acc;
    }, {});
    Object.keys(grouped).sort((a,b) => b.split('/').reverse().join('').localeCompare(a.split('/').reverse().join(''))).forEach(date => {
      const h = grouped[date];
      logContainer.innerHTML += `
        <div class="day-group">
          <div class="history-summary-row" onclick="const e = document.getElementById('det-${date.replace(/\//g,'-')}'); e.style.display = e.style.display==='block'?'none':'block'">
            <span style="color:#888">${date}</span>
            <span style="color:var(--income-green)">${h.inc.toLocaleString()}</span>
            <span style="color:var(--expense-red)">${h.exp.toLocaleString()}</span>
            <span>${(h.inc - h.exp).toLocaleString()}</span>
            <button class="action-btn" onclick="event.stopPropagation(); editDay('${date}')">✎</button>
          </div>
          <div class="day-details" id="det-${date.replace(/\//g,'-')}">
            ${h.items.map(item => `<div class="detail-item"><span>${item.category}</span><span style="color:${item.type==='Income'?'var(--income-green)':'var(--expense-red)'}">${item.amount.toLocaleString()}</span></div>`).join('')}
          </div>
        </div>`;
    });
  }

  function editDay(date) {
    currentlyEditingDate = date;
    const dailyLogs = txLogs.filter(log => log.date === date);
    document.getElementById('edit-date-label').innerText = date;
    document.getElementById('edit-indicator').style.display = 'block';
    document.querySelectorAll('input').forEach(i => { if(i.type === "number") i.value = ''; });
    dailyLogs.forEach(log => {
        let el = document.getElementById(log.fieldId);
        if(!el) { activateField(log.type === 'Income' ? 'inc' : 'exp', log.category); el = document.getElementById(log.fieldId); }
        if (el) el.value = log.amount;
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
    runCalc();
  }

  function exportToExcel() {
    let csv = "Date,Category,Type,Amount\n" + txLogs.map(l => `${l.date},"${l.category}",${l.type},${l.amount}`).join('\n');
    const link = document.createElement('a');
    link.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
    link.download = 'Finance_Report.csv';
    link.click();
  }

  function hardReset() { if(confirm("Erase All Data?")) { localStorage.clear(); location.reload(); } }
  init();
</script>
</body>
</html>
